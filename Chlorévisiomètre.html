<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chlorévisiomètre</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #2c2f33;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        
        /* En-tête avec le chrono et les boutons */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 10px;
        }

        #chrono {
            font-size: 2em;
            font-weight: bold;
            font-family: monospace;
            color: #4ade80; /* Vert clair motivant */
        }

        button {
            padding: 10px 20px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        #btnStart {
            background-color: #3b82f6; /* Bleu */
            color: white;
        }

        #btnStart:hover {
            background-color: #2563eb;
        }

        #btnStop {
            background-color: #ef4444; /* Rouge */
            color: white;
        }

        #btnStop:hover {
            background-color: #dc2626;
        }
        
        /* Grise le bouton quand il est désactivé */
        button:disabled {
            background-color: #6b7280;
            cursor: not-allowed;
            transform: none;
        }

        .game-container {
            text-align: center;
        }
        
        img {
            max-height: 70vh; /* Un peu réduit pour faire de la place en haut */
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            transition: transform 0.1s ease-in-out;
        }
        
        /* L'effet de clic sur l'image ne s'active que si le jeu est en cours */
        .jeu-actif img:active {
            transform: scale(0.98);
        }

        .controls {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1em;
        }
        
        kbd {
            background-color: #eee;
            color: #333;
            border-radius: 3px;
            border: 1px solid #b4b4b4;
            box-shadow: 0 1px 1px rgba(0,0,0,.2), 0 2px 0 0 rgba(255,255,255,.7) inset;
            padding: 2px 5px;
            font-weight: bold;
        }

        /* Message de fin caché par défaut */
        #messageFin {
            display: none;
            margin-top: 15px;
            color: #fcd34d;
            font-weight: bold;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

    <div class="header">
        <button id="btnStart">Démarrer la session</button>
        <div id="chrono">00:00:00</div>
        <button id="btnStop" disabled>Stopper la session</button>
    </div>

    <div class="game-container" id="gameContainer">
        <!-- On démarre directement sur l'image 5.png -->
        <img id="trackerImage" src="5.png" alt="État actuel du Chlorévisiomètre">
        
        <div class="controls">
            <p>Distraction ! Touche <kbd>Espace</kbd> : <strong>-1 PV</strong> (ou retombe à 5 en jauge bonus).</p>
            <p>Focus ! Touche <kbd>R</kbd> : <strong>+2 PV</strong>.</p>
            <p id="messageFin">Session terminée ! Excellent travail ! 🎉</p>
        </div>
    </div>

    <script>
        const extensionImage = ".png"; 
        let pvMax = 10;
        let pvActuels = 5; 
        let jeuEnCours = false; // Bloque les touches si on n'a pas cliqué sur Démarrer

        // Variables du chronomètre
        let timerInterval;
        let tempsSecondes = 0;

        // Éléments de la page
        const imageElement = document.getElementById("trackerImage");
        const chronoAffichage = document.getElementById("chrono");
        const btnStart = document.getElementById("btnStart");
        const btnStop = document.getElementById("btnStop");
        const gameContainer = document.getElementById("gameContainer");
        const messageFin = document.getElementById("messageFin");

        // Met à jour l'image
        function actualiserAffichage() {
            imageElement.src = pvActuels + extensionImage;
        }

        // Formate le temps en HH:MM:SS
        function formaterTemps(secondes) {
            let h = Math.floor(secondes / 3600);
            let m = Math.floor((secondes % 3600) / 60);
            let s = secondes % 60;
            return (
                String(h).padStart(2, "0") + ":" + 
                String(m).padStart(2, "0") + ":" + 
                String(s).padStart(2, "0")
            );
        }

        // --- GESTION DES BOUTONS ---

        btnStart.addEventListener("click", function() {
            // Réinitialise le jeu à 5 PV et le chrono à zéro à chaque nouveau départ
            pvActuels = 5;
            actualiserAffichage();
            tempsSecondes = 0;
            chronoAffichage.innerText = "00:00:00";
            messageFin.style.display = "none";
            
            jeuEnCours = true;
            gameContainer.classList.add("jeu-actif");
            
            btnStart.disabled = true;
            btnStop.disabled = false;

            // Lance le chronomètre
            timerInterval = setInterval(function() {
                tempsSecondes++;
                chronoAffichage.innerText = formaterTemps(tempsSecondes);
            }, 1000); // 1000 millisecondes = 1 seconde
        });

        btnStop.addEventListener("click", function() {
            jeuEnCours = false;
            gameContainer.classList.remove("jeu-actif");
            
            btnStart.disabled = false;
            btnStart.innerText = "Nouvelle session"; // Change le texte pour la prochaine fois
            btnStop.disabled = true;

            // Arrête le chronomètre
            clearInterval(timerInterval);
            
            // Affiche le message de félicitations
            messageFin.style.display = "block";
        });

        // --- GESTION DU CLAVIER ---

        document.addEventListener("keydown", function(event) {
            // Empêche la barre d'espace ou la flèche de faire défiler la page dans tous les cas
            if (event.code === "Space" || event.code === "ArrowDown") {
                event.preventDefault(); 
            }

            // Si le jeu n'est pas lancé, on ignore les frappes au clavier
            if (!jeuEnCours) return;

            // Touche ESPACE (Distraction)
            if (event.code === "Space" || event.code === "ArrowDown") {
                if (pvActuels > 5) {
                    pvActuels = 5; // Retour à 5 depuis la jauge bonus
                } else if (pvActuels > 1) {
                    pvActuels--; // Perd 1 PV
                }
                actualiserAffichage();
            }
            
            // Touche R (Focus)
            else if (event.code === "KeyR" || event.key === "r") {
                pvActuels += 2;
                if (pvActuels > pvMax) {
                    pvActuels = pvMax; // Plafond à 10
                }
                actualiserAffichage();
            }
        });
    </script>
</body>
</html>
