<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chlorévisiomètre Pro - Glassmorphism</title>
    <style>
        /* --- ARRIÈRE-PLAN --- */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none; 
            -webkit-user-select: none;
            background-color: #0a0a0c; /* Fond très sombre */
            overflow-x: hidden;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none; /* Laisse passer les clics vers les boutons */
        }

        /* --- EFFET VERRE DÉPOLI (GLASSMORPHISM) --- */
        .glass-panel {
            background: rgba(15, 15, 20, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 15px 20px;
            width: 90%;
            max-width: 400px;
        }

        #chrono {
            font-size: 2.2em;
            font-weight: bold;
            font-family: monospace;
            color: #f472b6; 
            text-shadow: 0 0 10px rgba(244, 114, 182, 0.5);
        }

        .header-buttons {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        /* --- BOUTONS TRANSPARENTS --- */
        button {
            padding: 12px 10px;
            font-size: 0.95em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            color: white;
            background: rgba(20, 20, 25, 0.6); /* Transparent sombre par défaut */
            backdrop-filter: blur(4px);
            border: 1px solid transparent;
        }

        button:active { transform: scale(0.95); }
        button:disabled { background: rgba(30, 30, 35, 0.4) !important; border-color: rgba(255,255,255,0.05) !important; color: rgba(255,255,255,0.3); cursor: not-allowed; transform: none; }

        /* Couleurs dynamiques au survol */
        #btnStart { border-color: rgba(16, 185, 129, 0.5); }
        #btnStart:hover:not(:disabled) { background: rgba(16, 185, 129, 0.2); border-color: #10b981; }

        #btnPause { border-color: rgba(236, 72, 153, 0.5); }
        #btnPause:hover:not(:disabled) { background: rgba(236, 72, 153, 0.2); border-color: #ec4899; }

        #btnStop { border-color: rgba(239, 68, 68, 0.5); }
        #btnStop:hover:not(:disabled) { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; }

        #btnMinus { border-color: rgba(245, 158, 11, 0.5); }
        #btnMinus:hover:not(:disabled) { background: rgba(245, 158, 11, 0.2); border-color: #f59e0b; }

        #btnBoutique { border-color: rgba(236, 72, 153, 0.5); }
        #btnBoutique:hover:not(:disabled) { background: rgba(236, 72, 153, 0.2); border-color: #ec4899; }

        #btnPlus { border-color: rgba(217, 70, 239, 0.5); }
        #btnPlus:hover:not(:disabled) { background: rgba(217, 70, 239, 0.2); border-color: #d946ef; }

        .status-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            width: 90%;
            max-width: 400px;
            justify-content: center;
        }

        .status-badge {
            font-size: 1.05em;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .pieces-display { color: #fbbf24; background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.5); }
        .pieces-display:hover { background: rgba(251, 191, 36, 0.25); }
        
        .repas-display { color: #f97316; background: rgba(249, 115, 22, 0.1); border: 1px solid rgba(249, 115, 22, 0.5); }
        .repas-display:hover { background: rgba(249, 115, 22, 0.25); }

        #panelPause {
            display: none;
            border: 1px solid rgba(236, 72, 153, 0.5);
            padding: 15px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 15px;
            text-align: center;
        }
        #titrePanelPause { margin: 0 0 10px 0; color: #ec4899; text-shadow: 0 0 8px rgba(236, 72, 153, 0.5); }
        #decomptePause { font-size: 2em; font-weight: bold; color: #ec4899; font-family: monospace; display: block; margin: 10px 0; }
        #btnStopperPause { border-color: rgba(217, 70, 239, 0.5); width: 100%; padding: 15px; font-size: 1.1em; }
        #btnStopperPause:hover { background: rgba(217, 70, 239, 0.2); border-color: #d946ef; }

        .game-container { text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .image-wrapper { position: relative; display: inline-block; }
        
        img {
            max-height: 50vh; max-width: 90vw; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            transition: opacity 0.5s ease-in-out, filter 0.3s ease; 
        }

        .shake { animation: shakeImage 0.8s; }
        @keyframes shakeImage {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .glow { animation: glowImage 0.8s; }
        @keyframes glowImage {
            0% { box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
            50% { box-shadow: 0 0 50px #f472b6, 0 0 20px #d946ef; } 
            100% { box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        }

        .en-pause { filter: grayscale(100%) opacity(0.5); }

        .burger-loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 5em; display: none; z-index: 10; filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.8));
            animation: eatBurger 2s steps(4, end) infinite;
        }
        @keyframes eatBurger {
            0% { clip-path: inset(0 0% 0 0); opacity: 1; }
            90% { clip-path: inset(0 100% 0 0); opacity: 1; }
            100% { clip-path: inset(0 100% 0 0); opacity: 0; }
        }

        .controls {
            margin-top: 15px; padding: 15px; width: 90%; max-width: 400px;
        }

        .action-buttons { display: flex; gap: 8px; margin-bottom: 10px; }
        .action-btn { padding: 10px 5px; font-size: 0.9em; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }

        .inventaire { 
            font-size: 0.9em; color: #cbd5e1; margin-top: 10px; 
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.05); font-weight: bold; 
        }

        #messageFin { display: none; margin-top: 15px; color: #fcd34d; font-weight: bold; font-size: 1.2em; text-align: center; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100;
        }
        
        .modal-content {
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px; border-radius: 15px; width: 90%; max-width: 320px; color: white; text-align: center; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            animation: fadeInModal 0.4s ease-out; 
        }
        @keyframes fadeInModal {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content.boutique { border: 1px solid rgba(236, 72, 153, 0.6); max-width: 350px; }
        .modal-content.alerte { border: 1px solid rgba(251, 191, 36, 0.6); }
        .modal-content.choix-pause { border: 1px solid rgba(236, 72, 153, 0.6); }

        .modal-content h3 { margin-top: 0; }
        .modal-content p { font-size: 0.95em; line-height: 1.5; color: #cbd5e1; white-space: pre-wrap; }
        
        .menu-btn { width: 100%; margin-top: 10px; padding: 12px; font-size: 1em; }
        
        .btn-modal-annuler { border-color: rgba(107, 114, 128, 0.5); }
        .btn-modal-annuler:hover { background: rgba(107, 114, 128, 0.2); border-color: #6b7280; }

    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="header glass-panel">
        <div id="chrono">00:00:00</div>
        <div class="header-buttons">
            <button id="btnStart">Démarrer</button>
            <button id="btnPause" disabled>Pause</button>
            <button id="btnStop" disabled>Stopper</button>
        </div>
    </div>
