<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chlorévisiomètre</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background-color: #2c2f33;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
            user-select: none; 
            -webkit-user-select: none;
        }
        
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }

        #chrono {
            font-size: 2.2em;
            font-weight: bold;
            font-family: monospace;
            color: #4ade80;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button {
            padding: 12px 15px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
            flex: 1;
            touch-action: manipulation; 
        }

        button:active {
            transform: scale(0.95);
        }

        #btnStart { background-color: #3b82f6; color: white; }
        #btnStop { background-color: #ef4444; color: white; }
        button:disabled { background-color: #6b7280; opacity: 0.5; cursor: not-allowed; transform: none; }

        .game-container {
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        img {
            max-height: 65vh;
            max-width: 90%;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        .controls {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .action-btn {
            padding: 15px 10px;
            font-size: 1.1em;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        #btnMinus { background-color: #f59e0b; color: white; } 
        #btnPlus { background-color: #10b981; color: white; } 

        #messageFin {
            display: none;
            margin-top: 15px;
            color: #fcd34d;
            font-weight: bold;
            font-size: 1.2em;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="chrono">00:00:00</div>
        <div class="header-buttons">
            <button id="btnStart">Démarrer</button>
            <button id="btnStop" disabled>Stopper</button>
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <img id="trackerImage" src="5.png" alt="État actuel du Chlorévisiomètre">
        
        <div class="controls">
            <div class="action-buttons">
                <button id="btnMinus" class="action-btn" disabled>
                    <span>👎 Distraction</span>
                    <small>-1 PV</small>
                </button>
                <button id="btnPlus" class="action-btn" disabled>
                    <span>👍 Focus (1h)</span>
                    <small>+2 PV</small>
                </button>
            </div>
            
            <p id="messageFin">Session terminée ! Excellent travail ! 🎉</p>
        </div>
    </div>

    <script>
        const extensionImage = ".png"; 
        let pvMax = 10;
        let pvActuels = 5; 
        let jeuEnCours = false; 
        let timerInterval;
        let tempsSecondes = 0;

        const imageElement = document.getElementById("trackerImage");
        const chronoAffichage = document.getElementById("chrono");
        const btnStart = document.getElementById("btnStart");
        const btnStop = document.getElementById("btnStop");
        const btnMinus = document.getElementById("btnMinus");
        const btnPlus = document.getElementById("btnPlus");
        const messageFin = document.getElementById("messageFin");

        // --- PRÉCHARGEMENT DES IMAGES ---
        // Cette fonction se lance toute seule au démarrage
        function prechargerImages() {
            for (let i = 1; i <= pvMax; i++) {
                let img = new Image();
                img.src = i + extensionImage;
            }
        }
        prechargerImages(); // Lancement du préchargement
        // --------------------------------

        function actualiserAffichage() {
            imageElement.src = pvActuels + extensionImage;
        }

        function formaterTemps(secondes) {
            let h = Math.floor(secondes / 3600);
            let m = Math.floor((secondes % 3600) / 60);
            let s = secondes % 60;
            return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
        }

        // --- ACTIONS DU JEU ---
        function declencherDistraction() {
            if (!jeuEnCours) return;
            if (pvActuels > 5) {
                pvActuels = 5; 
            } else if (pvActuels > 1) {
                pvActuels--; 
            }
            actualiserAffichage();
        }

        function declencherFocus() {
            if (!jeuEnCours) return;
            pvActuels += 2; 
            if (pvActuels > pvMax) pvActuels = pvMax;
            actualiserAffichage();
        }

        // --- GESTION DES BOUTONS START/STOP ---
        btnStart.addEventListener("click", function() {
            pvActuels = 5;
            actualiserAffichage();
            tempsSecondes = 0;
            chronoAffichage.innerText = "00:00:00";
            messageFin.style.display = "none";
            
            jeuEnCours = true;
            
            btnStart.disabled = true;
            btnStop.disabled = false;
            btnMinus.disabled = false;
            btnPlus.disabled = false;

            timerInterval = setInterval(function() {
                tempsSecondes++;
                chronoAffichage.innerText = formaterTemps(tempsSecondes);
            }, 1000);
        });

        btnStop.addEventListener("click", function() {
            jeuEnCours = false;
            
            btnStart.disabled = false;
            btnStart.innerText = "Nouvelle session"; 
            btnStop.disabled = true;
            btnMinus.disabled = true;
            btnPlus.disabled = true;

            clearInterval(timerInterval);
            messageFin.style.display = "block";
        });

        // --- GESTIONs DES ÉVÉNEMENTS ---
        btnMinus.addEventListener("click", declencherDistraction);
        btnPlus.addEventListener("click", declencherFocus);
        
    </script>
</body>
</html>
